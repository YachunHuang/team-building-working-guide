<div class="min-h-screen bg-gray-50 py-8 px-4 flex flex-col items-center">

  <!-- 錯誤狀態 -->
  <div *ngIf="errorMsg" class="bg-white border border-gray-200 rounded-xl p-10 text-center max-w-sm mt-16">
    <span class="material-icons text-5xl text-gray-400 mb-4 block">sentiment_dissatisfied</span>
    <p class="text-gray-600 mb-6">{{ errorMsg }}</p>
    <a routerLink="/form" class="inline-flex items-center gap-1 text-teal-600 font-mono text-sm tracking-widest uppercase hover:text-teal-700 transition">
      <span class="material-icons text-base">arrow_back</span> 回到填寫頁
    </a>
  </div>

  <!-- 主要內容 -->
  <ng-container *ngIf="data && !errorMsg">

    <!-- 操作列 -->
    <div class="flex justify-between items-center w-full max-w-sm mb-4">
      <a routerLink="/form" class="inline-flex items-center gap-1 text-gray-500 hover:text-gray-700 font-mono text-sm tracking-widest uppercase bg-white border border-gray-300 rounded-lg px-3 py-1.5 transition">
        <span class="material-icons text-base">arrow_back</span> 重新填寫
      </a>
      <a routerLink="/" class="inline-flex items-center gap-1.5 text-teal-600 hover:text-teal-700 font-mono text-sm tracking-widest uppercase bg-white border border-gray-300 rounded-lg px-3 py-1.5 transition">
        <span class="material-icons text-base">grid_view</span> 大廳
      </a>
    </div>

    <div class="w-full max-w-sm mb-4">
      <app-manual-card [data]="data"></app-manual-card>
    </div>

  </ng-container>
</div>
